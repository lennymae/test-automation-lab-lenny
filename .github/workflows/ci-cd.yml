name: Selenium TestNG CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@v2
        with:
          chromedriver-version: '131.0.6778.204'

      - name: Run Tests with Maven and TestNG
        working-directory: ./SeleniumJava_Project
        run: mvn clean test -Dsurefire.suiteXmlFiles=testng.xml
        env:
          CHROME_OPTIONS: --headless --disable-gpu --no-sandbox

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: ./SeleniumJava_Project/target/surefire-reports/
          retention-days: 30

      - name: Publish TestNG Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ./SeleniumJava_Project/target/surefire-reports/*.xml